plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// The original com.arthenica:ffmpeg-kit-min-gpl:6.0-2 artifact was removed from
// Maven Central on 2025-04-01 and maven.arthenica.com is no longer reachable.
// Substitute with the community-maintained fork on Maven Central.
configurations.all {
    resolutionStrategy {
        eachDependency { details ->
            if (details.requested.group == 'com.arthenica' && details.requested.name == 'ffmpeg-kit-min-gpl') {
                details.useTarget group: 'dev.ffmpegkit-maintained', name: 'ffmpeg-kit-min-gpl', version: '6.0.3'
            }
        }
    }
}

android {
    namespace "com.smartmedia.app"
    compileSdk 36
    ndkVersion "28.2.13676358"

    defaultConfig {
        applicationId "com.smartmedia.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        // Full FFmpeg binaries are large; package only needed ABIs in release.
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"),
                    "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
        debug {
            minifyEnabled false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.24"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "androidx.recyclerview:recyclerview:1.3.2"
    // FFmpeg is provided by the ffmpeg_kit_flutter_min_gpl Flutter plugin (see pubspec.yaml)
}
