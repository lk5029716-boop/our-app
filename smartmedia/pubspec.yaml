name: smartmedia
description: >
  SmartMedia — cross-platform GIF search keyboard that checks target field
  capabilities and transcodes GIFs to H.264 MP4 on-the-fly when needed.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  provider: ^6.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  # Bundled FFmpeg for GIF→H.264 MP4 transcoding; replaces the remote AAR dependency
  ffmpeg_kit_flutter_min_gpl: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
